<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jordan Wingenroth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@300;400&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sand: #f5f2ee;
      --ink: #1c1c1c;
      --muted: #6b6460;
      --accent: #7a9e8e;
      --rule: #ddd8d2;
    }

    html {
      font-size: 17px;
      background: var(--sand);
      color: var(--ink);
    }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 40px 20px;
    }

    .card {
      width: min(400px, 92vw);
      padding: 48px;
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .label {
      font-family: 'Inter', sans-serif;
      font-size: 0.74rem;
      font-weight: 400;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    .label a {
      color: inherit;
      text-decoration: none;
    }

    .label a:hover {
      text-decoration: underline;
    }

    .qr-wrap {
      width: 100%;
      max-width: 280px;
    }

    .qr-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
